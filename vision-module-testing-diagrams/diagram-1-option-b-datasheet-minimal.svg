    <text x="68" y="226" fill="#111111" font-size="12">MAG-IMG002x1-NC</text>
    <text x="68" y="244" fill="#444444" font-size="10">Mono / color</text>
    <rect x="56" y="266" width="328" height="56" fill="none" stroke="#111111"/>
