<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Figure: Vision module verification levels</title>
  <desc id="desc">Minimal monochrome figure: IC socket, PCB FT, module stack.</desc>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
  </defs>
  <rect width="1200" height="640" fill="#ffffff"/>
  <rect x="40" y="36" width="1120" height="1" fill="#111111"/>
