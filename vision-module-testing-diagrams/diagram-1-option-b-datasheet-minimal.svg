  <text x="1160" y="28" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="end">Vision Series</text>
  <text x="600" y="72" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Figure 1. Vision module: verification by assembly level</text>
  <text x="600" y="94" fill="#444444" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">From socket-tested ICs to PCB functional test to integrated three-PCB module (MAG-VIS100xx-N).</text>
  <rect x="40" y="118" width="360" height="460" fill="none" stroke="#111111" stroke-width="1"/>
  <rect x="420" y="118" width="360" height="460" fill="none" stroke="#111111" stroke-width="1"/>
  <rect x="800" y="118" width="360" height="460" fill="none" stroke="#111111" stroke-width="1"/>
  <text x="220" y="148" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="middle">A. IC (socket)</text>
  <text x="220" y="166" fill="#444444" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">Characterization and FT</text>
  <text x="600" y="148" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="middle">B. Assembled PCB</text>
  <text x="600" y="166" fill="#444444" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">Functional test</text>
  <text x="980" y="148" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="middle">C. Module (3-PCB stack)</text>
  <text x="980" y="166" fill="#444444" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">FT and characterization</text>
