    <text x="448" y="414" fill="#111111" font-size="12">MAG-VIS4003x-N</text>
    <text x="448" y="432" fill="#444444" font-size="10">MAG-CXP00002-NP</text>
    <text x="436" y="492" fill="#444444" font-size="10">Post-assembly PCB functional test.</text>
    <rect x="816" y="220" width="328" height="200" fill="none" stroke="#111111"/>
