<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Vision module: product vs verification level matrix</title>
  <desc id="desc">Matrix of subsystem rows and verification level columns with Magics product codes.</desc>
  <defs>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2a5080"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="520" fill="#ffffff"/>
  <rect x="0" y="0" width="1100" height="56" fill="url(#band)"/>
  <text x="40" y="36" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="600">Vision module: products by verification level</text>
  <!-- Table: module column (Level C) is one merged cell; internal h-lines stop at col 3 -->
  <g stroke="#d9dee6" stroke-width="1" fill="none">
    <rect x="40" y="80" width="1020" height="400"/>
    <line x1="240" y1="80" x2="240" y2="480"/>
    <line x1="520" y1="80" x2="520" y2="480"/>
    <line x1="800" y1="80" x2="800" y2="480"/>
    <line x1="40" y1="140" x2="1060" y2="140"/>
    <line x1="40" y1="240" x2="800" y2="240"/>
    <line x1="40" y1="340" x2="800" y2="340"/>
    <line x1="40" y1="480" x2="1060" y2="480"/>
  </g>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <rect x="40" y="80" width="200" height="60" fill="#e8edf4"/>
    <text x="140" y="116" fill="#1e3a5f" font-size="12" font-weight="700" text-anchor="middle">Subsystem</text>
    <rect x="240" y="80" width="280" height="60" fill="#e8edf4"/>
    <text x="380" y="108" fill="#1e3a5f" font-size="12" font-weight="700" text-anchor="middle">Level A: IC in socket</text>
    <text x="380" y="126" fill="#5c6570" font-size="10" text-anchor="middle">Characterization and FT</text>
    <rect x="520" y="80" width="280" height="60" fill="#e8edf4"/>
    <text x="660" y="108" fill="#1e3a5f" font-size="12" font-weight="700" text-anchor="middle">Level B: assembled PCB</text>
    <text x="660" y="126" fill="#5c6570" font-size="10" text-anchor="middle">Functional test</text>
    <rect x="800" y="80" width="260" height="60" fill="#e8edf4"/>
    <text x="930" y="108" fill="#1e3a5f" font-size="12" font-weight="700" text-anchor="middle">Level C: module</text>
    <text x="930" y="126" fill="#5c6570" font-size="10" text-anchor="middle">3-PCB stack, FT and char.</text>
  </g>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <text x="140" y="200" fill="#1e3a5f" font-size="13" font-weight="600" text-anchor="middle">Image</text>
    <text x="380" y="195" fill="#2d3748" font-size="13" text-anchor="middle">MAG-IMG002x1-NC</text>
    <text x="380" y="215" fill="#5c6570" font-size="10" text-anchor="middle">Mono / color</text>
    <text x="660" y="200" fill="#2d3748" font-size="13" text-anchor="middle">MAG-VIS4000x-N</text>
    <text x="140" y="300" fill="#1e3a5f" font-size="13" font-weight="600" text-anchor="middle">Power</text>
    <text x="380" y="295" fill="#2d3748" font-size="13" text-anchor="middle">MAG-PSU00001-NP</text>
    <text x="660" y="295" fill="#2d3748" font-size="13" text-anchor="middle">MAG-VIS4001x-N</text>
    <text x="660" y="315" fill="#5c6570" font-size="10" text-anchor="middle">With / without driver option</text>
    <text x="140" y="410" fill="#1e3a5f" font-size="13" font-weight="600" text-anchor="middle">CoaXPress</text>
    <text x="380" y="400" fill="#2d3748" font-size="13" text-anchor="middle">MAG-CXP00002-NP</text>
    <text x="660" y="410" fill="#2d3748" font-size="13" text-anchor="middle">MAG-VIS4003x-N</text>
    <rect x="801" y="141" width="258" height="338" fill="#faf6f0" stroke="none"/>
    <text x="930" y="255" fill="#1e3a5f" font-size="13" font-weight="700" text-anchor="middle">MAG-VIS100xx-N</text>
    <text x="930" y="285" fill="#2d3748" font-size="12" text-anchor="middle">Integrated vision module</text>
    <text x="930" y="312" fill="#5c6570" font-size="11" text-anchor="middle">Stack of three PCBs:</text>
    <text x="930" y="332" fill="#5c6570" font-size="11" text-anchor="middle">MAG-VIS4000x + MAG-VIS4001x</text>
    <text x="930" y="352" fill="#5c6570" font-size="11" text-anchor="middle">+ MAG-VIS4003x</text>
    <text x="930" y="385" fill="#5c6570" font-size="10" text-anchor="middle">Module-level FT and characterization</text>
    <text x="930" y="405" fill="#5c6570" font-size="10" text-anchor="middle">after PCB bring-up.</text>
  </g>
  <text x="40" y="502" fill="#8a9299" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">The letter x denotes product family or configuration suffix.</text>
</svg>
