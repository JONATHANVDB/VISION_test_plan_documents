<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc">
  <title id="title">Vision module: physical stack and part traceability</title>
  <desc id="desc">Bottom-up traceability from three ICs to three PCBs to stacked module product code.</desc>
  <rect width="1000" height="720" fill="#f4f5f7"/>
  <text x="500" y="42" fill="#1e3a5f" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="600" text-anchor="middle">Vision module: assembly and traceability</text>
  <text x="500" y="68" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" text-anchor="middle">From characterized die-in-socket to verified 3-PCB module</text>
  <g transform="translate(500,150)">
    <rect x="-200" y="-40" width="400" height="100" rx="8" fill="#ffffff" stroke="#1e3a5f" stroke-width="2"/>
    <text y="-5" fill="#1e3a5f" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Module (verified assembly)</text>
    <text y="18" fill="#2d3748" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">MAG-VIS100xx-N</text>
    <text y="42" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" text-anchor="middle">FT and characterization at module level</text>
  </g>
  <line x1="500" y1="210" x2="500" y2="248" stroke="#1e3a5f" stroke-width="2"/>
  <polygon points="500,258 494,246 506,246" fill="#1e3a5f"/>
  <g transform="translate(500,310)" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <g transform="translate(14,-14)">
      <rect x="-190" y="-70" width="380" height="56" rx="6" fill="#e8eef6" stroke="#8fa8c4"/>
      <text y="-38" fill="#1e3a5f" font-size="11" font-weight="700" text-anchor="middle">PCB: CoaXPress</text>
      <text y="-20" fill="#2d3748" font-size="12" text-anchor="middle">MAG-VIS4003x-N</text>
    </g>
    <g>
      <rect x="-190" y="-14" width="380" height="56" rx="6" fill="#dfe8f4" stroke="#7b96b8"/>
      <text y="18" fill="#1e3a5f" font-size="11" font-weight="700" text-anchor="middle">PCB: Power</text>
      <text y="36" fill="#2d3748" font-size="12" text-anchor="middle">MAG-VIS4001x-N</text>
    </g>
    <g transform="translate(-14,14)">
      <rect x="-190" y="42" width="380" height="56" rx="6" fill="#d5e0f2" stroke="#6a86ad"/>
      <text y="74" fill="#1e3a5f" font-size="11" font-weight="700" text-anchor="middle">PCB: Image sensor</text>
      <text y="92" fill="#2d3748" font-size="12" text-anchor="middle">MAG-VIS4000x-N</text>
    </g>
  </g>
  <text x="500" y="292" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" text-anchor="middle">PCB functional test after SMT / assembly</text>
  <g stroke="#5c6570" stroke-width="1.5" fill="none">
    <path d="M 340 418 L 340 450 L 200 450 L 200 478"/>
    <path d="M 500 418 L 500 478"/>
    <path d="M 660 418 L 660 450 L 800 450 L 800 478"/>
  </g>
  <g fill="#5c6570">
    <polygon points="200,488 194,476 206,476"/>
    <polygon points="500,488 494,476 506,476"/>
    <polygon points="800,488 794,476 806,476"/>
  </g>
  <text x="500" y="408" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" text-anchor="middle">Each PCB hosts one characterized IC family</text>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <rect x="80" y="500" width="240" height="100" rx="8" fill="#ffffff" stroke="#c5d4e8"/>
    <text x="200" y="530" fill="#1e3a5f" font-size="11" font-weight="700" text-anchor="middle">IC: Image</text>
    <text x="200" y="552" fill="#2d3748" font-size="13" text-anchor="middle">MAG-IMG002x1-NC</text>
    <text x="200" y="574" fill="#5c6570" font-size="10" text-anchor="middle">Socket: char. and FT</text>
    <rect x="380" y="500" width="240" height="100" rx="8" fill="#ffffff" stroke="#c5d4e8"/>
    <text x="500" y="530" fill="#1e3a5f" font-size="11" font-weight="700" text-anchor="middle">IC: Power</text>
    <text x="500" y="552" fill="#2d3748" font-size="13" text-anchor="middle">MAG-PSU00001-NP</text>
    <text x="500" y="574" fill="#5c6570" font-size="10" text-anchor="middle">Socket: char. and FT</text>
    <rect x="680" y="500" width="240" height="100" rx="8" fill="#ffffff" stroke="#c5d4e8"/>
    <text x="800" y="530" fill="#1e3a5f" font-size="11" font-weight="700" text-anchor="middle">IC: CoaXPress</text>
    <text x="800" y="552" fill="#2d3748" font-size="13" text-anchor="middle">MAG-CXP00002-NP</text>
    <text x="800" y="574" fill="#5c6570" font-size="10" text-anchor="middle">Socket: char. and FT</text>
  </g>
  <text x="500" y="640" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" text-anchor="middle">Arrows: design and manufacturing traceability (not necessarily build sequence).</text>
  <text x="500" y="668" fill="#8a9299" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" text-anchor="middle">Editable SVG: adjust stack order or add camera end-item (e.g. MAG-CAM1000x-N) if needed.</text>
</svg>
