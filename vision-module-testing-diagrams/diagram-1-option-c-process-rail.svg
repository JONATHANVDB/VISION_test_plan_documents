<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Vision Series: three-step verification rail</title>
  <desc id="desc">Horizontal process rail with numbered stages and three-column detail, matching diagram 1 structure.</desc>
  <defs>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3f5c"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#fafbfc"/>
  <text x="600" y="40" fill="#1a2332" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle">Vision Series imaging stack</text>
  <text x="600" y="66" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" text-anchor="middle">Verification focus: products and assembly levels (not production test equipment)</text>
  <!-- Process rail -->
  <line x1="120" y1="118" x2="1080" y2="118" stroke="#cfd6e0" stroke-width="4" stroke-linecap="round"/>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <circle cx="220" cy="118" r="22" fill="#2f3f5c" stroke="#ffffff" stroke-width="3"/>
    <text x="220" y="125" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">1</text>
    <circle cx="600" cy="118" r="22" fill="#2f3f5c" stroke="#ffffff" stroke-width="3"/>
    <text x="600" y="125" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">2</text>
    <circle cx="980" cy="118" r="22" fill="#2f3f5c" stroke="#ffffff" stroke-width="3"/>
    <text x="980" y="125" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">3</text>
  </g>
  <text x="220" y="158" fill="#1a2332" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Die / package in socket</text>
  <text x="600" y="158" fill="#1a2332" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Populated PCBs</text>
  <text x="980" y="158" fill="#1a2332" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Integrated module</text>
  <!-- Columns -->
  <rect x="40" y="188" width="360" height="460" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
  <rect x="420" y="188" width="360" height="460" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
  <rect x="800" y="188" width="360" height="460" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
  <text x="220" y="222" fill="#2f3f5c" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">IC products</text>
  <text x="220" y="242" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" text-anchor="middle">Characterization and FT</text>
  <text x="600" y="222" fill="#2f3f5c" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Board products</text>
  <text x="600" y="242" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" text-anchor="middle">Functional test</text>
  <text x="980" y="222" fill="#2f3f5c" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">MAG-VIS100xx-N</text>
  <text x="980" y="242" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" text-anchor="middle">Module FT and characterization</text>
  <line x1="402" y1="385" x2="416" y2="385" stroke="#2f3f5c" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="782" y1="385" x2="796" y2="385" stroke="#2f3f5c" stroke-width="2.5" marker-end="url(#a)"/>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <rect x="60" y="258" width="320" height="72" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="80" y="280" fill="#1a2332" font-size="12" font-weight="700">CMOS image sensor</text>
    <text x="80" y="300" fill="#2d3748" font-size="13">MAG-IMG002x1-NC</text>
    <text x="80" y="318" fill="#5c6570" font-size="11">Mono / color</text>
    <rect x="60" y="340" width="320" height="64" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="80" y="362" fill="#1a2332" font-size="12" font-weight="700">Point-of-load DC/DC</text>
    <text x="80" y="382" fill="#2d3748" font-size="13">MAG-PSU00001-NP</text>
    <rect x="60" y="414" width="320" height="72" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="80" y="436" fill="#1a2332" font-size="12" font-weight="700">CoaXPress serializer</text>
    <text x="80" y="456" fill="#2d3748" font-size="13">MAG-CXP00002-NP</text>
    <text x="80" y="474" fill="#5c6570" font-size="11">Video over 75 Ohm coax</text>
    <text x="60" y="520" fill="#5c6570" font-size="11">Conditions per qualification / characterization plan.</text>
    <rect x="440" y="258" width="320" height="88" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="460" y="280" fill="#1a2332" font-size="12" font-weight="700">Imaging PCB</text>
    <text x="460" y="300" fill="#2d3748" font-size="13">MAG-VIS4000x-N</text>
    <text x="460" y="320" fill="#5c6570" font-size="11">Sensor site</text>
    <rect x="440" y="356" width="320" height="88" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="460" y="378" fill="#1a2332" font-size="12" font-weight="700">Power PCB</text>
    <text x="460" y="398" fill="#2d3748" font-size="13">MAG-VIS4001x-N</text>
    <text x="460" y="418" fill="#5c6570" font-size="11">Converter site</text>
    <rect x="440" y="454" width="320" height="88" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="460" y="476" fill="#1a2332" font-size="12" font-weight="700">Serializer PCB</text>
    <text x="460" y="496" fill="#2d3748" font-size="13">MAG-VIS4003x-N</text>
    <text x="460" y="516" fill="#5c6570" font-size="11">CXP site</text>
    <text x="440" y="568" fill="#5c6570" font-size="11">Post-assembly board FT before stack integration.</text>
    <rect x="820" y="290" width="320" height="210" rx="8" fill="#fffbeb" stroke="#fcd34d"/>
    <text x="840" y="322" fill="#1a2332" font-size="13" font-weight="700">Electronic camera module</text>
    <text x="840" y="348" fill="#2d3748" font-size="14">Three-PCB vertical stack</text>
    <text x="840" y="384" fill="#5c6570" font-size="12">Combines MAG-VIS4000x, MAG-VIS4001x, and</text>
    <text x="840" y="402" fill="#5c6570" font-size="12">MAG-VIS4003x into one shippable module.</text>
    <line x1="840" y1="420" x2="1100" y2="420" stroke="#fcd34d"/>
    <text x="840" y="442" fill="#5c6570" font-size="11">CoaXPress downlink / uplink and power at module scope.</text>
    <text x="840" y="466" fill="#8a9299" font-size="10">Public overview: magics.tech/products-series/vision-series</text>
  </g>
  <text x="40" y="678" fill="#8a9299" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">Suffix x / xx: product family or build option. Edit vectors in Inkscape, Affinity Designer, or draw.io.</text>
</svg>
