<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Vision Series: verification by assembly level</title>
  <desc id="desc">Three-stage flow aligned with Vision Series product page: IC, PCB, electronic camera module.</desc>
  <defs>
    <linearGradient id="hdrBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#151b24"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00a3a3"/>
      <stop offset="100%" stop-color="#00c2a8"/>
    </linearGradient>
    <filter id="cardSh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00a3a3"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#f0f2f5"/>
  <rect x="0" y="0" width="1200" height="92" fill="url(#hdrBg)"/>
  <rect x="0" y="92" width="1200" height="4" fill="url(#accentBar)"/>
  <text x="48" y="44" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.12em">VISION SERIES</text>
  <text x="48" y="74" fill="#e6e9ef" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="600">Imaging</text>
  <text x="48" y="88" fill="#00c2a8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="600">magics.tech / products-series / vision-series</text>
  <text x="1152" y="74" fill="#8b98a8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" text-anchor="end">Customer overview</text>
  <text x="600" y="130" fill="#3d4754" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" text-anchor="middle">Rad-hard Full HD CMOS stack: verification depth from characterized ICs to the integrated three-PCB module.</text>
  <rect x="40" y="152" width="360" height="480" rx="8" fill="#ffffff" stroke="#dfe3ea" stroke-width="1" filter="url(#cardSh)"/>
  <rect x="420" y="152" width="360" height="480" rx="8" fill="#ffffff" stroke="#dfe3ea" stroke-width="1" filter="url(#cardSh)"/>
  <rect x="800" y="152" width="360" height="480" rx="8" fill="#ffffff" stroke="#dfe3ea" stroke-width="1" filter="url(#cardSh)"/>
  <rect x="40" y="152" width="360" height="6" rx="8" fill="#00a3a3"/>
  <rect x="420" y="152" width="360" height="6" rx="8" fill="#2a6f97"/>
  <rect x="800" y="152" width="360" height="6" rx="8" fill="#c9a227"/>
  <text x="220" y="194" fill="#0d1117" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">1. IC (socket)</text>
  <text x="220" y="216" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" text-anchor="middle">Characterization and functional test</text>
  <text x="600" y="194" fill="#0d1117" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">2. Vision Series PCBs</text>
  <text x="600" y="216" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" text-anchor="middle">Functional test after assembly</text>
  <text x="980" y="194" fill="#0d1117" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">3. Electronic camera module</text>
  <text x="980" y="216" fill="#5c6570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" text-anchor="middle">Three-PCB vertical stack</text>
  <line x1="402" y1="360" x2="416" y2="360" stroke="#00a3a3" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="782" y1="360" x2="796" y2="360" stroke="#00a3a3" stroke-width="2.5" marker-end="url(#arr)"/>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <rect x="60" y="236" width="320" height="78" rx="6" fill="#f4faf9" stroke="#b8e0dc"/>
    <text x="80" y="258" fill="#0d1117" font-size="12" font-weight="700">Full HD CMOS image sensor</text>
    <text x="80" y="278" fill="#2d3748" font-size="13">MAG-IMG002x1-NC</text>
    <text x="80" y="298" fill="#5c6570" font-size="11">Monochrome or color (e.g. x = 41 / 51)</text>
    <rect x="60" y="324" width="320" height="72" rx="6" fill="#f4faf9" stroke="#b8e0dc"/>
    <text x="80" y="346" fill="#0d1117" font-size="12" font-weight="700">Rad-hard DC/DC converter</text>
    <text x="80" y="366" fill="#2d3748" font-size="13">MAG-PSU00001-NP</text>
    <rect x="60" y="406" width="320" height="78" rx="6" fill="#f4faf9" stroke="#b8e0dc"/>
    <text x="80" y="428" fill="#0d1117" font-size="12" font-weight="700">CoaXPress 2.0 serializer</text>
    <text x="80" y="448" fill="#2d3748" font-size="13">MAG-CXP00002-NP</text>
    <text x="80" y="468" fill="#5c6570" font-size="11">Parallel video to coaxial link</text>
    <text x="60" y="518" fill="#5c6570" font-size="11">Electrical and thermal conditions per datasheet and flow.</text>
  </g>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <rect x="440" y="236" width="320" height="92" rx="6" fill="#f7fafc" stroke="#c5d8e8"/>
    <text x="460" y="258" fill="#0d1117" font-size="12" font-weight="700">Imaging PCB</text>
    <text x="460" y="278" fill="#2d3748" font-size="13">MAG-VIS4000x-N</text>
    <text x="460" y="298" fill="#5c6570" font-size="11">Hosts MAG-IMG002x1-NC</text>
    <text x="460" y="316" fill="#5c6570" font-size="11">(image sensor)</text>
    <rect x="440" y="338" width="320" height="92" rx="6" fill="#f7fafc" stroke="#c5d8e8"/>
    <text x="460" y="360" fill="#0d1117" font-size="12" font-weight="700">Power supply PCB</text>
    <text x="460" y="380" fill="#2d3748" font-size="13">MAG-VIS4001x-N</text>
    <text x="460" y="400" fill="#5c6570" font-size="11">Hosts MAG-PSU00001-NP</text>
    <rect x="440" y="440" width="320" height="92" rx="6" fill="#f7fafc" stroke="#c5d8e8"/>
    <text x="460" y="462" fill="#0d1117" font-size="12" font-weight="700">Serializer PCB</text>
    <text x="460" y="482" fill="#2d3748" font-size="13">MAG-VIS4003x-N</text>
    <text x="460" y="502" fill="#5c6570" font-size="11">Hosts MAG-CXP00002-NP</text>
    <text x="440" y="562" fill="#5c6570" font-size="11">Board-level functional verification after SMT / assembly.</text>
  </g>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <rect x="820" y="268" width="320" height="220" rx="8" fill="#fffbf0" stroke="#e8d49a"/>
    <text x="840" y="302" fill="#0d1117" font-size="13" font-weight="700">MAG-VIS100xx-N</text>
    <text x="840" y="326" fill="#2d3748" font-size="12">Modular camera electronics stack (~36 mm x 36 mm class)</text>
    <text x="840" y="352" fill="#5c6570" font-size="12">Integrates imaging, power, and serializer paths</text>
    <text x="840" y="374" fill="#5c6570" font-size="12">into one verified assembly.</text>
    <line x1="840" y1="388" x2="1100" y2="388" stroke="#e8d49a"/>
    <text x="840" y="412" fill="#5c6570" font-size="11">Stack: MAG-VIS4000x + MAG-VIS4001x + MAG-VIS4003x</text>
    <text x="840" y="434" fill="#5c6570" font-size="11">Module FT and characterization at agreed conditions.</text>
    <text x="840" y="460" fill="#8a9299" font-size="10">Optional EVK path: MAG-CAM1000x-N (not shown).</text>
  </g>
  <text x="48" y="658" fill="#8a9299" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">x / xx denote configuration suffixes. Wording aligned with public Vision Series product page; edit in Inkscape, Affinity Designer, or draw.io.</text>
</svg>
